<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="56%" r="62%">
      <stop offset="0%" stop-color="#3a2012"/>
      <stop offset="60%" stop-color="#190f0a"/>
      <stop offset="100%" stop-color="#100a07"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8c3e" stop-opacity="0.5"/>
      <stop offset="55%" stop-color="#ff6e28" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ff7828" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="7"/></filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- glowing low-poly coal chunks at the base -->
  <g filter="url(#soft)" fill="#ff8f3c">
    <polygon points="120,392 168,372 196,408 150,430"/>
    <polygon points="300,372 350,366 372,404 322,420"/>
    <polygon points="220,400 268,392 286,428 236,436"/>
  </g>
  <g fill="#ffae5c">
    <polygon points="128,396 160,384 180,408 146,420"/>
    <polygon points="312,378 346,374 360,398 326,408"/>
  </g>

  <!-- warm glow behind the pet -->
  <circle cx="256" cy="256" r="190" fill="url(#glow)"/>

  <!-- the pet: a faceted low-poly coal -->
  <g stroke-linejoin="round">
    <polygon points="256,120 350,168 372,256 330,344 256,384 182,344 140,256 162,168"
             fill="#2b2529" stroke="#140d0e" stroke-width="6"/>
    <!-- a few lighter / warmer facets -->
    <polygon points="256,120 350,168 256,232 162,168" fill="#37302f"/>
    <polygon points="330,344 372,256 256,232 256,384" fill="#3b2a22"/>
    <polygon points="182,344 140,256 256,232 256,384" fill="#241b1d"/>
  </g>

  <!-- face: glossy white eyes + cream smile -->
  <g>
    <ellipse cx="214" cy="248" rx="22" ry="28" fill="#f7f0eb"/>
    <ellipse cx="298" cy="248" rx="22" ry="28" fill="#f7f0eb"/>
    <ellipse cx="219" cy="256" rx="11" ry="13" fill="#1e1214"/>
    <ellipse cx="303" cy="256" rx="11" ry="13" fill="#1e1214"/>
    <circle cx="208" cy="240" r="6" fill="#ffffff"/>
    <circle cx="292" cy="240" r="6" fill="#ffffff"/>
    <path d="M228 300 Q256 332 284 300" fill="none" stroke="#f5e8da" stroke-width="12" stroke-linecap="round"/>
  </g>
</svg>
